apply plugin: 'com.android.application'

android {
    compileSdkVersion 33
    namespace "com.classroom.autostart"

    defaultConfig {
        applicationId "com.classroom.autostart"
        minSdkVersion 21
        targetSdkVersion 33
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
        debug {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}
