<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>교실알림 관리자</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#f0f2f5;min-height:100vh;color:#222}
/* ── 잠금화면 ── */
#lockScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1e3a5f,#2d6a9f)}
.lock-box{background:#fff;border-radius:20px;padding:48px 40px;width:360px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.lock-logo{font-size:48px;margin-bottom:16px}
.lock-title{font-size:22px;font-weight:800;color:#1e3a5f;margin-bottom:6px}
.lock-sub{font-size:13px;color:#888;margin-bottom:28px}
.lock-input{width:100%;padding:14px 16px;border:2px solid #e0e0e0;border-radius:12px;font-size:16px;text-align:center;letter-spacing:4px;outline:none;transition:.2s}
.lock-input:focus{border-color:#2d6a9f}
.lock-btn{width:100%;padding:14px;background:#1e3a5f;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;margin-top:14px;transition:.2s}
.lock-btn:hover{background:#2d6a9f}
.lock-err{color:#e05050;font-size:13px;margin-top:10px;min-height:18px}
/* ── 메인 레이아웃 ── */
#adminPage{display:none}
.header{background:#1e3a5f;color:#fff;padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:60px;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.header-title{font-size:18px;font-weight:800;display:flex;align-items:center;gap:10px}
.logout-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:7px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600}
.logout-btn:hover{background:rgba(255,255,255,.25)}
/* ── 탭 ── */
.tab-bar{background:#fff;border-bottom:2px solid #e8eaf0;display:flex;gap:0;padding:0 32px}
.tab-btn{padding:16px 28px;font-size:15px;font-weight:700;border:none;background:none;cursor:pointer;color:#888;border-bottom:3px solid transparent;margin-bottom:-2px;transition:.2s}
.tab-btn.active{color:#1e3a5f;border-bottom-color:#1e3a5f}
.tab-btn:hover:not(.active){color:#2d6a9f}
/* ── 콘텐츠 ── */
.content{max-width:1100px;margin:32px auto;padding:0 24px}
.panel{display:none}
.panel.active{display:block}
.section-title{font-size:20px;font-weight:800;color:#1e3a5f;margin-bottom:20px;display:flex;align-items:center;gap:10px}
/* ── 테이블 ── */
.table-wrap{background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.07);overflow:hidden;margin-bottom:24px}
table{width:100%;border-collapse:collapse}
th{background:#f5f7fa;padding:12px 16px;text-align:left;font-size:13px;font-weight:700;color:#555;border-bottom:2px solid #e8eaf0}
td{padding:12px 16px;border-bottom:1px solid #f0f0f0;font-size:14px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbff}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.badge-holiday{background:#fde8e8;color:#c0392b}
.badge-exam{background:#fff3cd;color:#856404}
.badge-important{background:#e8f4fd;color:#1a6fa0}
.badge-event{background:#e8f8ee;color:#1a7a4a}
/* ── 버튼 ── */
.btn{padding:8px 16px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;transition:.15s}
.btn-primary{background:#1e3a5f;color:#fff}
.btn-primary:hover{background:#2d6a9f}
.btn-danger{background:#fde8e8;color:#c0392b}
.btn-danger:hover{background:#f5b7b7}
.btn-edit{background:#f0f4ff;color:#2d6a9f}
.btn-edit:hover{background:#dce8ff}
.btn-add{background:#1e3a5f;color:#fff;padding:10px 22px;font-size:14px;border-radius:10px;margin-bottom:16px}
.btn-add:hover{background:#2d6a9f}
.btn-save-all{background:#27ae60;color:#fff;padding:10px 22px;font-size:14px;border-radius:10px}
.btn-save-all:hover{background:#219a52}
.btn-row{display:flex;gap:6px}
/* ── 폼 / 모달 ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:28px;width:440px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-title{font-size:17px;font-weight:800;color:#1e3a5f;margin-bottom:20px}
.form-group{margin-bottom:16px}
.form-label{font-size:13px;font-weight:700;color:#555;margin-bottom:6px;display:block}
.form-input{width:100%;padding:10px 14px;border:2px solid #e0e0e0;border-radius:10px;font-size:14px;outline:none;transition:.2s}
.form-input:focus{border-color:#2d6a9f}
.form-select{width:100%;padding:10px 14px;border:2px solid #e0e0e0;border-radius:10px;font-size:14px;outline:none;background:#fff}
.modal-btns{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
/* ── 선택 영역 ── */
.filter-bar{display:flex;gap:12px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.filter-select{padding:9px 14px;border:2px solid #e0e0e0;border-radius:10px;font-size:14px;outline:none;background:#fff;min-width:160px}
/* ── 토스트 ── */
#toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:#1e3a5f;color:#fff;padding:12px 28px;border-radius:30px;font-size:14px;font-weight:700;display:none;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,.3)}
/* ── 로딩 ── */
.loading{text-align:center;padding:48px;color:#888;font-size:15px}
</style>
</head>
<body>

<!-- ── 잠금화면 ── -->
<div id="lockScreen">
  <div class="lock-box">
    <div class="lock-logo">🔐</div>
    <div class="lock-title">교실알림 관리자</div>
    <div class="lock-sub">관리자 비밀번호를 입력해주세요</div>
    <input type="password" class="lock-input" id="pwInput" placeholder="비밀번호" maxlength="20"
      onkeydown="if(event.key==='Enter')tryLogin()">
    <button class="lock-btn" onclick="tryLogin()">로그인</button>
    <div class="lock-err" id="pwErr"></div>
  </div>
</div>

<!-- ── 메인 관리자 페이지 ── -->
<div id="adminPage">
  <div class="header">
    <div class="header-title">⚙️ 교실알림 관리자</div>
    <button class="logout-btn" onclick="logout()">로그아웃</button>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('calendar',this)">📅 학사일정</button>
    <button class="tab-btn" onclick="switchTab('teachers',this)">👩‍🏫 교과 선생님</button>
    <button class="tab-btn" onclick="switchTab('roster',this)">👨‍🎓 학생 명단</button>
  </div>

  <div class="content">

    <!-- ━━━ 학사일정 탭 ━━━ -->
    <div class="panel active" id="panel-calendar">
      <div class="section-title">📅 학사일정 관리</div>
      <div style="display:flex;gap:10px;margin-bottom:16px">
        <button class="btn btn-add" onclick="openCalModal()">+ 일정 추가</button>
        <button class="btn btn-save-all" onclick="saveCalendar()">💾 저장</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th style="width:130px">날짜</th>
            <th style="width:50px">요일</th>
            <th>행사명</th>
            <th style="width:90px">종류</th>
            <th style="width:100px">관리</th>
          </tr></thead>
          <tbody id="calBody"><tr><td colspan="5" class="loading">🔄 불러오는 중...</td></tr></tbody>
        </table>
      </div>
      <div style="color:#888;font-size:12px">※ 저장 버튼을 눌러야 앱에 반영됩니다.</div>
    </div>

    <!-- ━━━ 교과 선생님 탭 ━━━ -->
    <div class="panel" id="panel-teachers">
      <div class="section-title">👩‍🏫 교과 선생님 관리</div>
      <div style="display:flex;gap:10px;margin-bottom:16px">
        <button class="btn btn-add" onclick="openTeacherModal()">+ 선생님 추가</button>
        <button class="btn btn-save-all" onclick="saveTeachers()">💾 저장</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>선생님 이름</th>
            <th>담당 과목</th>
            <th style="width:100px">관리</th>
          </tr></thead>
          <tbody id="teacherBody"><tr><td colspan="3" class="loading">🔄 불러오는 중...</td></tr></tbody>
        </table>
      </div>
      <div style="color:#888;font-size:12px">※ 저장 버튼을 눌러야 앱에 반영됩니다.</div>
    </div>

    <!-- ━━━ 학생 명단 탭 ━━━ -->
    <div class="panel" id="panel-roster">
      <div class="section-title">👨‍🎓 학생 명단 관리</div>
      <div class="filter-bar">
        <select class="filter-select" id="rosterClassSel" onchange="loadRosterTable()">
          <option value="">반 선택...</option>
        </select>
        <button class="btn btn-add" onclick="openStudentModal()" id="addStudentBtn" style="display:none">+ 학생 추가</button>
        <button class="btn btn-save-all" onclick="saveRoster()" id="saveRosterBtn" style="display:none">💾 저장</button>
      </div>
      <div class="table-wrap" id="rosterTableWrap" style="display:none">
        <table>
          <thead><tr>
            <th style="width:70px">번호</th>
            <th>학생 이름</th>
            <th style="width:100px">관리</th>
          </tr></thead>
          <tbody id="rosterBody"></tbody>
        </table>
      </div>
      <div style="color:#888;font-size:12px" id="rosterHint" style="display:none">※ 저장 버튼을 눌러야 앱에 반영됩니다.</div>
    </div>

  </div>
</div>

<!-- ── 학사일정 모달 ── -->
<div class="modal-bg" id="calModal" onclick="if(event.target===this)closeCalModal()">
  <div class="modal">
    <div class="modal-title" id="calModalTitle">📅 일정 추가</div>
    <div class="form-group">
      <label class="form-label">날짜</label>
      <input type="date" class="form-input" id="calDate">
    </div>
    <div class="form-group">
      <label class="form-label">행사명</label>
      <input type="text" class="form-input" id="calEvent" placeholder="예) 학력평가, 개학식">
    </div>
    <div class="form-group">
      <label class="form-label">종류</label>
      <select class="form-select" id="calType">
        <option value="event">행사</option>
        <option value="exam">시험</option>
        <option value="holiday">휴일</option>
        <option value="important">중요</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="btn btn-edit" onclick="closeCalModal()">취소</button>
      <button class="btn btn-primary" onclick="saveCalItem()">저장</button>
    </div>
  </div>
</div>

<!-- ── 교과 선생님 모달 ── -->
<div class="modal-bg" id="teacherModal" onclick="if(event.target===this)closeTeacherModal()">
  <div class="modal">
    <div class="modal-title" id="teacherModalTitle">👩‍🏫 선생님 추가</div>
    <div class="form-group">
      <label class="form-label">선생님 이름</label>
      <input type="text" class="form-input" id="teacherName" placeholder="예) 홍길동">
    </div>
    <div class="form-group">
      <label class="form-label">담당 과목</label>
      <input type="text" class="form-input" id="teacherSubject" placeholder="예) 국어, 수학, 영어">
    </div>
    <div class="modal-btns">
      <button class="btn btn-edit" onclick="closeTeacherModal()">취소</button>
      <button class="btn btn-primary" onclick="saveTeacherItem()">저장</button>
    </div>
  </div>
</div>

<!-- ── 학생 모달 ── -->
<div class="modal-bg" id="studentModal" onclick="if(event.target===this)closeStudentModal()">
  <div class="modal">
    <div class="modal-title" id="studentModalTitle">👨‍🎓 학생 추가</div>
    <div class="form-group">
      <label class="form-label">번호</label>
      <input type="number" class="form-input" id="studentNo" placeholder="예) 29" min="1">
    </div>
    <div class="form-group">
      <label class="form-label">이름</label>
      <input type="text" class="form-input" id="studentName" placeholder="예) 홍길동">
    </div>
    <div class="modal-btns">
      <button class="btn btn-edit" onclick="closeStudentModal()">취소</button>
      <button class="btn btn-primary" onclick="saveStudentItem()">저장</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="js/data.js"></script>
<script>
// ── Firebase 설정 ──
const FB_CONFIG = {
  apiKey: "AIzaSyDF8OLuBylKToxAxKDfZAm9D1uBRlBjv4s",
  authDomain: "numeric-mile-356201.firebaseapp.com",
  databaseURL: "https://numeric-mile-356201-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "numeric-mile-356201"
};
let db = null;
try {
  firebase.initializeApp(FB_CONFIG);
  db = firebase.database();
} catch(e) {
  try {
    db = firebase.app().database();
  } catch(e2) { console.warn('Firebase 초기화 실패:', e2); }
}

// ── 비밀번호 ──
const ADMIN_PW = '0070start';

function tryLogin() {
  const pw = document.getElementById('pwInput').value;
  if (pw === ADMIN_PW) {
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('adminPage').style.display = 'block';
    initAdmin();
  } else {
    const err = document.getElementById('pwErr');
    err.textContent = '비밀번호가 올바르지 않습니다.';
    document.getElementById('pwInput').value = '';
    setTimeout(() => err.textContent = '', 2000);
  }
}
function logout() {
  document.getElementById('lockScreen').style.display = 'flex';
  document.getElementById('adminPage').style.display = 'none';
  document.getElementById('pwInput').value = '';
}

// ── 탭 전환 ──
function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
}

// ── 토스트 ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2500);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 초기화
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function initAdmin() {
  await Promise.all([loadCalendar(), loadTeachers(), loadRosterClasses()]);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 📅 학사일정
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let calItems = []; // 현재 편집 중인 목록
let calEditIdx = -1; // 편집 중인 인덱스 (-1=추가)

const DAYS = ['일','월','화','수','목','금','토'];
const TYPE_LABEL = { holiday:'휴일', exam:'시험', important:'중요', event:'행사' };
const TYPE_BADGE = { holiday:'badge-holiday', exam:'badge-exam', important:'badge-important', event:'badge-event' };

async function loadCalendar() {
  if (!db) { calItems = ACADEMIC_CALENDAR.map(e => ({...e})); renderCalTable(); return; }
  // Firebase 오버라이드 먼저, 없으면 기본 data.js
  try {
    const snap = await db.ref('adminData/calendar').once('value');
    if (snap.val()) { calItems = snap.val(); } else { calItems = ACADEMIC_CALENDAR.map(e => ({...e})); }
  } catch(e) { calItems = ACADEMIC_CALENDAR.map(e => ({...e})); }
  renderCalTable();
}

function renderCalTable() {
  calItems.sort((a,b) => a.date.localeCompare(b.date));
  const tbody = document.getElementById('calBody');
  if (!calItems.length) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#aaa;padding:32px">일정이 없습니다</td></tr>';
    return;
  }
  tbody.innerHTML = calItems.map((item, i) => {
    const d = new Date(item.date);
    const day = DAYS[d.getDay()];
    const badge = TYPE_BADGE[item.type] || 'badge-event';
    const label = TYPE_LABEL[item.type] || '행사';
    return `<tr>
      <td>${item.date}</td>
      <td>${day}</td>
      <td>${item.event}</td>
      <td><span class="badge ${badge}">${label}</span></td>
      <td><div class="btn-row">
        <button class="btn btn-edit" onclick="openCalModal(${i})">수정</button>
        <button class="btn btn-danger" onclick="deleteCalItem(${i})">삭제</button>
      </div></td>
    </tr>`;
  }).join('');
}

function openCalModal(idx) {
  calEditIdx = (idx === undefined) ? -1 : idx;
  const title = document.getElementById('calModalTitle');
  if (calEditIdx === -1) {
    title.textContent = '📅 일정 추가';
    document.getElementById('calDate').value = '';
    document.getElementById('calEvent').value = '';
    document.getElementById('calType').value = 'event';
  } else {
    title.textContent = '📅 일정 수정';
    const item = calItems[calEditIdx];
    document.getElementById('calDate').value = item.date;
    document.getElementById('calEvent').value = item.event;
    document.getElementById('calType').value = item.type || 'event';
  }
  document.getElementById('calModal').classList.add('open');
}
function closeCalModal() { document.getElementById('calModal').classList.remove('open'); }

function saveCalItem() {
  const date = document.getElementById('calDate').value;
  const event = document.getElementById('calEvent').value.trim();
  const type = document.getElementById('calType').value;
  if (!date || !event) { alert('날짜와 행사명을 입력해주세요.'); return; }
  const d = new Date(date);
  const day = DAYS[d.getDay()];
  const item = { date, day, event, type };
  if (calEditIdx === -1) {
    calItems.push(item);
  } else {
    calItems[calEditIdx] = item;
  }
  renderCalTable();
  closeCalModal();
}

function deleteCalItem(idx) {
  if (!confirm(`"${calItems[idx].event}" 일정을 삭제하시겠습니까?`)) return;
  calItems.splice(idx, 1);
  renderCalTable();
}

async function saveCalendar() {
  if (!db) { showToast('❌ Firebase 연결 실패 — 저장 불가'); return; }
  try {
    await db.ref('adminData/calendar').set(calItems);
    showToast('✅ 학사일정이 저장됐습니다!');
  } catch(e) {
    showToast('❌ 저장 실패: ' + e.message);
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 👩‍🏫 교과 선생님
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let teacherItems = []; // [{name, subject}]
let teacherEditIdx = -1;

async function loadTeachers() {
  const defaultTeachers = () => Object.entries(SUBJECT_SUBSTITUTE_MAP)
    .filter(([,v]) => v && v.subject)
    .map(([name, v]) => ({ name, subject: v.subject }))
    .sort((a,b) => a.name.localeCompare(b.name, 'ko'));
  if (!db) { teacherItems = defaultTeachers(); renderTeacherTable(); return; }
  try {
    const snap = await db.ref('adminData/teachers').once('value');
    if (snap.val()) { teacherItems = snap.val(); } else { teacherItems = defaultTeachers(); }
  } catch(e) { teacherItems = defaultTeachers(); }
  renderTeacherTable();
}

function renderTeacherTable() {
  const tbody = document.getElementById('teacherBody');
  if (!teacherItems.length) {
    tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:#aaa;padding:32px">선생님 정보가 없습니다</td></tr>';
    return;
  }
  tbody.innerHTML = teacherItems.map((t, i) => `<tr>
    <td><strong>${t.name}</strong></td>
    <td>${t.subject}</td>
    <td><div class="btn-row">
      <button class="btn btn-edit" onclick="openTeacherModal(${i})">수정</button>
      <button class="btn btn-danger" onclick="deleteTeacherItem(${i})">삭제</button>
    </div></td>
  </tr>`).join('');
}

function openTeacherModal(idx) {
  teacherEditIdx = (idx === undefined) ? -1 : idx;
  document.getElementById('teacherModalTitle').textContent = teacherEditIdx === -1 ? '👩‍🏫 선생님 추가' : '👩‍🏫 선생님 수정';
  if (teacherEditIdx === -1) {
    document.getElementById('teacherName').value = '';
    document.getElementById('teacherSubject').value = '';
  } else {
    document.getElementById('teacherName').value = teacherItems[teacherEditIdx].name;
    document.getElementById('teacherSubject').value = teacherItems[teacherEditIdx].subject;
  }
  document.getElementById('teacherModal').classList.add('open');
}
function closeTeacherModal() { document.getElementById('teacherModal').classList.remove('open'); }

function saveTeacherItem() {
  const name = document.getElementById('teacherName').value.trim();
  const subject = document.getElementById('teacherSubject').value.trim();
  if (!name || !subject) { alert('이름과 과목을 입력해주세요.'); return; }
  if (teacherEditIdx === -1) {
    teacherItems.push({ name, subject });
  } else {
    teacherItems[teacherEditIdx] = { name, subject };
  }
  renderTeacherTable();
  closeTeacherModal();
}

function deleteTeacherItem(idx) {
  if (!confirm(`"${teacherItems[idx].name}" 선생님 정보를 삭제하시겠습니까?`)) return;
  teacherItems.splice(idx, 1);
  renderTeacherTable();
}

async function saveTeachers() {
  if (!db) { showToast('❌ Firebase 연결 실패 — 저장 불가'); return; }
  try {
    await db.ref('adminData/teachers').set(teacherItems);
    showToast('✅ 교과 선생님 정보가 저장됐습니다!');
  } catch(e) {
    showToast('❌ 저장 실패: ' + e.message);
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 👨‍🎓 학생 명단
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let rosterData = {}; // { '1-1': [{no,name},...], ... }
let currentClass = '';
let studentEditIdx = -1;

async function loadRosterClasses() {
  // 반 목록 채우기
  const sel = document.getElementById('rosterClassSel');
  const classes = Object.keys(STUDENT_ROSTER).sort((a,b) => {
    const [ag,ac] = a.split('-').map(Number);
    const [bg,bc] = b.split('-').map(Number);
    return ag !== bg ? ag-bg : ac-bc;
  });
  classes.forEach(cls => {
    const opt = document.createElement('option');
    opt.value = cls;
    opt.textContent = cls + '반';
    sel.appendChild(opt);
  });

  let fbData = {};
  if (db) {
    try {
      const snap = await db.ref('adminData/roster').once('value');
      fbData = snap.val() || {};
    } catch(e) { fbData = {}; }
  }
  // 기본 데이터 + Firebase 오버라이드 병합
  classes.forEach(cls => {
    if (fbData[cls]) {
      rosterData[cls] = fbData[cls];
    } else {
      rosterData[cls] = STUDENT_ROSTER[cls].students.map(s => ({...s}));
    }
  });
}

function loadRosterTable() {
  currentClass = document.getElementById('rosterClassSel').value;
  const wrap = document.getElementById('rosterTableWrap');
  const addBtn = document.getElementById('addStudentBtn');
  const saveBtn = document.getElementById('saveRosterBtn');
  const hint = document.getElementById('rosterHint');
  if (!currentClass) { wrap.style.display='none'; addBtn.style.display='none'; saveBtn.style.display='none'; return; }
  wrap.style.display = 'block';
  addBtn.style.display = 'inline-block';
  saveBtn.style.display = 'inline-block';
  hint.style.display = 'block';
  renderRosterTable();
}

function renderRosterTable() {
  const students = rosterData[currentClass] || [];
  const tbody = document.getElementById('rosterBody');
  tbody.innerHTML = students.map((s, i) => `<tr>
    <td>${s.no}</td>
    <td>${s.name}</td>
    <td><div class="btn-row">
      <button class="btn btn-edit" onclick="openStudentModal(${i})">수정</button>
      <button class="btn btn-danger" onclick="deleteStudent(${i})">삭제</button>
    </div></td>
  </tr>`).join('');
}

function openStudentModal(idx) {
  studentEditIdx = (idx === undefined) ? -1 : idx;
  document.getElementById('studentModalTitle').textContent = studentEditIdx === -1 ? '👨‍🎓 학생 추가' : '👨‍🎓 학생 수정';
  if (studentEditIdx === -1) {
    const students = rosterData[currentClass] || [];
    document.getElementById('studentNo').value = students.length + 1;
    document.getElementById('studentName').value = '';
  } else {
    const s = rosterData[currentClass][studentEditIdx];
    document.getElementById('studentNo').value = s.no;
    document.getElementById('studentName').value = s.name;
  }
  document.getElementById('studentModal').classList.add('open');
}
function closeStudentModal() { document.getElementById('studentModal').classList.remove('open'); }

function saveStudentItem() {
  const no = parseInt(document.getElementById('studentNo').value);
  const name = document.getElementById('studentName').value.trim();
  if (!no || !name) { alert('번호와 이름을 입력해주세요.'); return; }
  if (!rosterData[currentClass]) rosterData[currentClass] = [];
  if (studentEditIdx === -1) {
    rosterData[currentClass].push({ no, name });
  } else {
    rosterData[currentClass][studentEditIdx] = { no, name };
  }
  rosterData[currentClass].sort((a,b) => a.no - b.no);
  renderRosterTable();
  closeStudentModal();
}

function deleteStudent(idx) {
  const s = rosterData[currentClass][idx];
  if (!confirm(`"${s.name}" 학생을 삭제하시겠습니까?`)) return;
  rosterData[currentClass].splice(idx, 1);
  renderRosterTable();
}

async function saveRoster() {
  if (!db) { showToast('❌ Firebase 연결 실패 — 저장 불가'); return; }
  try {
    const saveObj = {};
    saveObj[currentClass] = rosterData[currentClass];
    await db.ref('adminData/roster').update(saveObj);
    showToast(`✅ ${currentClass}반 명단이 저장됐습니다!`);
  } catch(e) {
    showToast('❌ 저장 실패: ' + e.message);
  }
}
</script>
