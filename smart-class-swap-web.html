<html lang="ko">
<head>
  <meta charset="UTF-8" />

  <title>스마트 수업교체 도우미 (웹버전)</title>
  <style>
    :root{
      --bg:#f9f7ff;--card:#ffffff;--line:#e6deef;--ink:#334155;--muted:#6b7280;
      --brand:#8b9cf6;--brand2:#a5b4fc;--warn:#f7d794;
      --pastel-yellow:#fef9c3;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic",sans-serif}
    .wrap{max-width:1600px;margin:0 auto;padding:14px}
    .hero{background:linear-gradient(135deg,#a5b4fc,#c4b5fd);color:#1f2937;border-radius:14px;padding:16px}
    .hero h1{margin:0 0 6px;font-size:22px}
    .notice{margin-top:8px;background:#fffdf3;color:#7c5e10;border:1px solid #f3e3b2;border-left:5px solid var(--warn);padding:10px;border-radius:10px;font-size:13px}
    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
    .tab{border:1px solid var(--line);background:#fff;border-radius:10px;padding:9px 12px;cursor:pointer;color:#1f2a37;font-weight:600}
    .tab.on{background:#ede9fe;border-color:#c4b5fd;font-weight:700}
    .page{display:none}
    .page.on{display:block}
    .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:12px}
    .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .muted{font-size:12px;color:var(--muted)}
    input,select,button,textarea{border:1px solid #cbd7e5;border-radius:8px;padding:8px;font:inherit}
    button{background:#a5b4fc;color:#1f2937;cursor:pointer;font-weight:700}
    .ghost{background:#fff;color:#334155}
    .table-wrap{overflow:auto;max-height:72vh}
    table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
    th,td{border:1px solid var(--line);padding:6px;text-align:center;vertical-align:middle;word-break:keep-all}
    th{background:#f3f4f6}
    .left{text-align:left}
    .click{cursor:pointer}
    .click:hover{background:#f5f3ff}
    .cell-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1.2;min-height:42px}
    .cell-title{font-size:11px;font-weight:700;color:#334155}
    .cell-sub{font-size:10px;color:#64748b;margin-top:2px}
    .tag{display:inline-block;padding:2px 8px;border-radius:999px;background:#f5f3ff;border:1px solid #ddd6fe;font-size:12px;margin:2px}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .calendar-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:6px}
    .cal-head{background:#eef5ff;border:1px solid var(--line);border-radius:8px;padding:6px;text-align:center;font-size:12px;font-weight:700}
    .cal-cell{min-height:98px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:6px;font-size:12px}
    .cal-date{font-weight:700;color:#334155}
    .cal-event{margin-top:4px;padding:4px;border-radius:6px;background:#eff6ff;color:#1e3a8a;font-size:11px;line-height:1.3}
    .free-grid{overflow:auto}
    .free-table td.ok{background:#dcfce7;color:#166534;font-weight:700}
    .free-table td.no{background:#f8fafc;color:#94a3b8}
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;padding:12px}
    .modal-bg.on{display:flex}
    .modal{background:#fff;border-radius:12px;width:min(900px,100%);max-height:90vh;overflow:auto;padding:14px}
    .modal-head{display:flex;justify-content:space-between;align-items:center;background:#ddd6fe;color:#312e81;padding:12px 14px;border-radius:10px}
    .result-section{margin-top:12px}
    .result-title{font-weight:800;font-size:16px;margin:8px 0}
    .result-card{display:flex;gap:10px;align-items:flex-start;border:1px solid #e2e8f0;border-radius:12px;padding:10px;margin-bottom:10px;background:#fff}
    .result-idx{width:28px;height:28px;border-radius:999px;background:#c4b5fd;color:#312e81;display:flex;align-items:center;justify-content:center;font-weight:700;flex:0 0 28px}
    .teacher-matrix{max-width:980px}
    .teacher-matrix table{table-layout:fixed}
    .teacher-matrix .period-col{width:160px;font-weight:700;background:#f5f5f5}
    .teacher-matrix .day-head{font-size:34px;font-weight:500;background:#f0f0f0}
    .teacher-matrix .subject-cell{height:88px;line-height:1.2;background:#fff}
    .teacher-matrix .subject-cell.elective{background:var(--pastel-yellow)}
    .teacher-matrix .subj-main{font-size:22px}
    .teacher-matrix .subj-sub{font-size:14px;color:#2563eb;margin-top:3px}
    .result-main{font-weight:700}
    .result-sub{font-size:13px;color:#475569;margin-top:2px}
    .footer{font-size:12px;color:#64748b;text-align:center;padding:8px}
    @media (max-width:900px){
      .hero h1{font-size:18px}
      .wrap{padding:10px}
      .tabs{gap:6px}
      .tab{padding:8px 10px;font-size:13px}
      .grid2{grid-template-columns:1fr}
      th,td{font-size:11px;padding:5px}
      .table-wrap{max-height:65vh}
    }
  </style>
</head>

    function normalizeName(raw){
      if(!raw) return "";
      const s = String(raw).trim();
      const m = s.match(/\(([^)]+)\)/);
      return (m ? m[1] : s).trim();
    }

    function parseGvizText(text){
      const m = text.match(/setResponse\(([\s\S]+)\);?$/);
      if(!m) throw new Error("gviz 응답 파싱 실패");
      return JSON.parse(m[1]);
    }

    function cellValue(row, idx){
      const c = row && row.c && row.c[idx];
      if(!c) return "";
      if(typeof c.v === "string" || typeof c.v === "number") return String(c.v).trim();
      if(typeof c.f === "string" || typeof c.f === "number") return String(c.f).trim();
      return "";
    }
    function normalizeDayToken(v){
      const s = String(v || "").replace(/\s+/g,"").trim();
      if(!s) return "";
      if(s.includes("월")) return "월";
      if(s.includes("화")) return "화";
      if(s.includes("수")) return "수";
      if(s.includes("목")) return "목";
      if(s.includes("금")) return "금";
      return "";
    }

    function parseClassGrade(value){
      const s = String(value || "");
      const m1 = s.match(/([1-3])학년/);
      if(m1) return m1[1];
      const m2 = s.match(/(?:^|[^0-9])([1-3])(?:0[1-9]|[1-9][0-9])(?:[^0-9]|$)/);
      if(m2) return m2[1];
      const m3 = s.match(/(?:^|[^0-9])([1-3])-(\d+)(?:[^0-9]|$)/);
      if(m3) return m3[1];
      return null;
    }

    function calculateTeacherGroups(schedule){
      const map = {};
      schedule.teachers.forEach((teacher)=>{
        const row = schedule.tableData.find(r=>r.teacher===teacher);
        let g12=0, g3=0;
        if(row){
          schedule.days.forEach(d=>schedule.periods.forEach(p=>{
            const v = row[d+p];
            if(!v) return;
            const g = parseClassGrade(v);
            if(g==="3") g3++;
            if(g==="1"||g==="2") g12++;
          }));
        }
        map[teacher] = g3 > g12 ? "3" : "12";
      });
      return map;
    }

    function buildScheduleFromGviz(gvizJson){
      const rows = (gvizJson && gvizJson.table && gvizJson.table.rows) ? gvizJson.table.rows : [];
      if(rows.length < 6) throw new Error("시트 데이터 행이 부족합니다.");
      const days = ["월","화","수","목","금"];
      
      // 헤더(교사성명/요일) 행 자동 탐색
      let headerDayIdx = -1;
      let headerPeriodIdx = -1;
      for(let r=0; r<Math.min(rows.length, 30); r++){
        const col1 = cellValue(rows[r],1);
        const col2 = normalizeDayToken(cellValue(rows[r],2));
        const hasTeacherHeader = col1.includes("교사성명");
        const hasDayHeader = days.includes(col2) || days.includes(normalizeDayToken(cellValue(rows[r],3)));
        if(hasTeacherHeader && hasDayHeader){
          headerDayIdx = r;
          headerPeriodIdx = r + 1;
          break;
        }
      }
      if(headerDayIdx === -1 || !rows[headerPeriodIdx]) {
        // 백업: 기존 구조 가정
        headerDayIdx = 2;
        headerPeriodIdx = 3;
      }

      const headerDayRow = rows[headerDayIdx];
      const headerPeriodRow = rows[headerPeriodIdx];

      // 마지막 열 탐색: 헤더 + 초반 데이터 일부를 함께 검사
      let lastCol = 2;
      const sampleEnd = Math.min(rows.length, headerPeriodIdx + 30);
      for(let c=2;c<260;c++){
        let hasAny = false;
        if(cellValue(headerDayRow,c)) hasAny = true;
        if(cellValue(headerPeriodRow,c)) hasAny = true;
        if(!hasAny){
          for(let r=headerPeriodIdx+1; r<sampleEnd; r++){
            if(cellValue(rows[r],c)){ hasAny = true; break; }
          }
        }
        if(hasAny) lastCol = c + 1;
      }

      // 열별 요일/교시 메타 구성 (병합/빈칸 헤더 대응)
      const colMeta = [];
      let currentDay = "";
      const dayColCount = { "월":0,"화":0,"수":0,"목":0,"금":0 };
      for(let c=2; c<lastCol; c++){
        const dayCell = normalizeDayToken(cellValue(headerDayRow,c));
        if(dayCell && days.includes(dayCell)) currentDay = dayCell;
        if(!days.includes(currentDay)) continue;

        let p = parseInt(cellValue(headerPeriodRow,c),10);
        if(isNaN(p)){
          // 교시 헤더가 비어있으면 같은 요일 내 순서로 보정
          dayColCount[currentDay] = (dayColCount[currentDay] || 0) + 1;
          p = dayColCount[currentDay];
        }else{
          dayColCount[currentDay] = Math.max(dayColCount[currentDay] || 0, p);
        }
        colMeta.push({ col:c, day:currentDay, period:p });
      }

      const periodSet = new Set(colMeta.map(m=>m.period).filter(p=>!isNaN(p) && p>=1 && p<=7));
      const periods = Array.from(periodSet).sort((a,b)=>a-b);
      const finalPeriods = periods.length ? periods : [1,2,3,4,5,6,7];

      const teachers = [];
      const tableData = [];
      for(let r=headerPeriodIdx+1; r<rows.length; r++){
        const rawName = cellValue(rows[r],1);
        const teacher = normalizeName(rawName);
        if(!teacher || teacher.includes("교사성명")) continue;
        const rowObj = { teacher };
        colMeta.forEach((meta)=>{
          if(meta.period < 1 || meta.period > 7) return;
          const v = cellValue(rows[r], meta.col);
          const key = meta.day + meta.period;
          // 같은 요일/교시 키가 중복될 경우, 빈 값으로 기존 과목을 덮어쓰지 않음
          if(!(key in rowObj) || (v && String(v).trim() !== "")) {
            rowObj[key] = v;
          }
        });
        teachers.push(teacher);
        tableData.push(rowObj);
      }

      return {
        teachers:Array.from(new Set(teachers)).sort(),
        days,
        periods: finalPeriods,
        tableData
      };
    }

    async function loadFromGoogleSheet(){
      const base = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?gid=${SHEET_GID}`;

      // 1) 일반 fetch (http/https 환경에서 우선 시도)
      try{
        const url = `${base}&tqx=out:json`;
        const res = await fetch(url);
        if(!res.ok) throw new Error("시트 요청 실패");
        const text = await res.text();
        const gviz = parseGvizText(text);
        const schedule = buildScheduleFromGviz(gviz);
        APP.schedule = schedule;
        APP.teacherGroups = calculateTeacherGroups(schedule);
        return;
      }catch(fetchErr){
        // 2) file:// 환경 등 fetch 차단 시 JSONP로 재시도
      }

      const gviz = await loadGvizByJsonp(base);
      const schedule = buildScheduleFromGviz(gviz);
      if(!schedule.teachers || schedule.teachers.length < 5) {
        throw new Error("시트에서 교사 데이터 파싱 실패(교사 수 부족)");
      }
      APP.schedule = schedule;
      APP.teacherGroups = calculateTeacherGroups(schedule);
    }

    function loadGvizByJsonp(baseUrl){
      return new Promise((resolve,reject)=>{
        const cbName = `__gviz_cb_${Date.now()}_${Math.floor(Math.random()*10000)}`;
        const script = document.createElement("script");
        const timeoutId = setTimeout(()=>{
          cleanup();
          reject(new Error("시트 JSONP 로드 시간 초과"));
        }, 10000);

        function cleanup(){
          clearTimeout(timeoutId);
          try{ delete window[cbName]; }catch(_e){ window[cbName] = undefined; }
          if(script && script.parentNode) script.parentNode.removeChild(script);
        }

        window[cbName] = function(payload){
          cleanup();
          if(!payload || !payload.table) {
            reject(new Error("시트 JSONP 응답 형식 오류"));
            return;
          }
          resolve(payload);
        };

        script.onerror = function(){
          cleanup();
          reject(new Error("시트 JSONP 스크립트 로드 실패"));
        };

        // responseHandler를 지정하면 callback({...}) 형태로 내려와 file://에서도 로드 가능
        script.src = `${baseUrl}&tqx=out:json;responseHandler:${cbName}`;
        document.head.appendChild(script);
      });
    }

    function parseInfo(v){
      if(!v) return {g:null,c:null};
      const s=String(v);
      let m=s.match(/(?:^|\\D)([1-3])(0[1-9]|[1-9]\\d)(?=\\D|$)/);
      if(m){const n=parseInt(m[2],10);return{g:m[1],c:n>10?"선택":String(n)};}
      m=s.match(/(?:^|\\D)([1-3])-(\\d+)(?=\\D|$)/);
      if(m){const n=parseInt(m[2],10);return{g:m[1],c:n>10?"선택":String(n)};}
      return {g:null,c:null};
    }
    function isElectiveClass(v){
      const s = String(v || "");
      if(!s.trim()) return false;
      if(s.includes("선택")) return true;
      if(/[A-Z]_/.test(s)) return true; // E_언매, J_실국 등
      const info = parseInfo(s);
      if(info.c === "선택") return true;
      return false;
    }
    function displayCell(v){
      const s = String(v || "").trim();
      if(!s) return "";
      // 예: "1학년 /통합사회1(3)" -> "통합사회1(3)"
      const slash = s.split("/");
      if(slash.length > 1){
        return slash[slash.length - 1].trim();
      }
      return s;
    }
    function splitCell(v){
      const raw = String(v || "").trim();
      if(!raw) return {title:"", sub:""};
      const part = displayCell(raw);
      const m = part.match(/^(.+?)\(([^)]+)\)$/);
      if(m) return { title:m[1].trim(), sub:m[2].trim() };
      return { title:part, sub:"" };
    }
    function isHomeroomBusy(t,d,p){ return HOMEROOM.includes(t) && ((d==="월"&&p===7) || (d==="금"&&(p===5||p===6))); }
    function isLunchBusy(t,p){ return (APP.teacherGroups[t]||"12")==="3" && p===4; }
    function isTeaching(t,d,p){
      const r=rowOf(t); if(!r) return false;
      const v=String(r[d+p]||"").trim();
      if(v.includes("창체") && !HOMEROOM.includes(t)) return false;
      return v!=="" && !v.includes("공강");
    }
    function isAvailable(t,d,p){ return !isHomeroomBusy(t,d,p) && !isLunchBusy(t,p) && !isTeaching(t,d,p); }
    function subjectOf(t){ for(const [k,v] of Object.entries(SUBJECT_RULES)) if(v.includes(t)) return k; return null; }

    function showModal(html){ q("#modal").innerHTML=html; q("#modalBg").classList.add("on"); }
    q("#modalBg").addEventListener("click",(e)=>{ if(e.target.id==="modalBg") q("#modalBg").classList.remove("on"); });

    function openMatch(t,d,p){
      const r=rowOf(t), mine=r?String(r[d+p]||"").trim():""; if(!mine) return;
      const isElective = isElectiveClass(mine);
      const me=parseInfo(mine);
      const swaps=[], subs=[];
      if(!isElective){
        APP.schedule.tableData.forEach(o=>{
          if(o.teacher===t) return;
          APP.schedule.days.forEach(day=>APP.schedule.periods.forEach(per=>{
            const ov=String(o[day+per]||"").trim(); if(!ov) return;
            const oi=parseInfo(ov);
            const ok=me.g&&me.c&&me.c!=="선택"&&oi.g===me.g&&oi.c===me.c&&oi.c!=="선택" && !isElectiveClass(ov);
            if(!ok) return;
            if(!isAvailable(o.teacher,d,p)) return;
            if(!isAvailable(t,day,per)) return;
            swaps.push({teacher:o.teacher,day,per});
          }));
        });
      }
      const sbj=subjectOf(t), pool=sbj?SUBJECT_RULES[sbj].filter(x=>x!==t):[];
      pool.forEach(name=>{ if(isAvailable(name,d,p)) subs.push(name); });

      const swapHtml = swaps.length
        ? swaps.map((s,i)=>`
            <div class="result-card">
              <div class="result-idx">${i+1}</div>
              <div>
                <div class="result-main">${s.teacher} 선생님</div>
                <div class="result-sub">${s.day}요일 ${s.per}교시 · 내 시간과 맞교환</div>
              </div>
            </div>
          `).join("")
        : `<div class="result-card"><div><div class="result-main">교체 가능 교사가 없습니다</div><div class="result-sub">선택/이동수업 또는 조건 일치 대상 없음</div></div></div>`;

      const subHtml = subs.length
        ? subs.map((name,i)=>`
            <div class="result-card">
              <div class="result-idx">${i+1}</div>
              <div>
                <div class="result-main">${name} 선생님</div>
                <div class="result-sub">${d}요일 ${p}교시 공강으로 대체 가능</div>
              </div>
            </div>
          `).join("")
        : `<div class="result-card"><div><div class="result-main">대체 가능 교사가 없습니다</div><div class="result-sub">동일 교과 그룹 중 공강 교사 없음</div></div></div>`;

      showModal(`
        <div class="modal-head">
          <div style="font-size:30px;font-weight:900;line-height:1">수업 매칭 결과</div>
          <button class="ghost" onclick="document.getElementById('modalBg').classList.remove('on')">닫기</button>
        </div>
        <div class="card" style="margin-top:10px"><b>${t}</b> · ${d}요일 ${p}교시 · ${displayCell(mine)}</div>
        <div class="result-section">
          <div class="result-title">교체 가능 교사</div>
          ${swapHtml}
        </div>
        <div class="result-section">
          <div class="result-title">대체 가능 교사</div>
          ${subHtml}
        </div>
      `);
    }

    function buildSchedule(names, clickable){
      const {days,periods}=APP.schedule;
      let h=`<div class="table-wrap"><table><thead><tr><th rowspan="2">교사명</th>`;
      days.forEach(d=>h+=`<th colspan="${periods.length}">${d}</th>`);
      h+=`</tr><tr>`;
      days.forEach(()=>periods.forEach(p=>h+=`<th>${p}</th>`));
      h+=`</tr></thead><tbody>`;
      names.forEach(n=>{
        const r=rowOf(n)||{teacher:n};
        h+=`<tr><td class="left">${n}</td>`;
        days.forEach(d=>periods.forEach(p=>{
          const v=String(r[d+p]||"");
          const parts = splitCell(v);
          const content = parts.title
            ? `<div class="cell-wrap"><div class="cell-title">${parts.title}</div><div class="cell-sub">${parts.sub}</div></div>`
            : "";
          if(clickable&&v) h+=`<td class="click" onclick="openMatch('${n}','${d}',${p})">${content}</td>`;
          else h+=`<td>${content}</td>`;
        }));
        h+=`</tr>`;
      });
      h+=`</tbody></table></div>`;
      return h;
    }

    }
    function searchCalendar(){
      const month = q("#calMonth") ? q("#calMonth").value : "";
      const keyword = q("#calKeyword") ? q("#calKeyword").value.trim() : "";
      const list = [...APP.academicEvents]
        .sort((a,b)=>String(a.date).localeCompare(String(b.date)))
        .filter(x => !month || String(x.date).includes(month))
        .filter(x => !keyword || String(x.title).includes(keyword) || String(x.date).includes(keyword));

      if(!month){
        const rows = list.map(x=>`<tr><td>${x.date}</td><td class="left">${x.title}</td></tr>`).join("");
        q("#calRes").innerHTML = `<div class="muted" style="margin-bottom:8px">월을 선택하면 달력 형태로 표시됩니다.</div><table><thead><tr><th>일자</th><th>학사일정</th></tr></thead><tbody>${rows || "<tr><td colspan='2'>검색 결과 없음</td></tr>"}</tbody></table>`;
        return;
      }

      const y = Number((list[0]?.date || "2026-03-01").split("-")[0]);
      const m = Number(month.replace(/-/g,""));
      const first = new Date(y, m-1, 1);
      const startDow = first.getDay();
      const lastDate = new Date(y, m, 0).getDate();

      const eventMap = {};
      list.forEach(ev=>{
        const d = Number(String(ev.date).split("-")[2]);
        if(!eventMap[d]) eventMap[d] = [];
        eventMap[d].push(ev.title);
      });

      const dayNames = ["일","월","화","수","목","금","토"];
      let grid = `<div class="calendar-grid">${dayNames.map(n=>`<div class="cal-head">${n}</div>`).join("")}`;
      for(let i=0;i<startDow;i++) grid += `<div class="cal-cell"></div>`;
      for(let d=1; d<=lastDate; d++){
        const events = eventMap[d] || [];
        grid += `<div class="cal-cell"><div class="cal-date">${d}</div>${events.map(t=>`<div class="cal-event">${t}</div>`).join("")}</div>`;
      }
      grid += `</div>`;
      q("#calRes").innerHTML = grid;
    }
    function renderContact(){
      q("#contact").innerHTML = `
        <div class="card row">
          <input id="contactKeyword" placeholder="이름/업무/내선 검색" oninput="searchContact()" />
          <button class="ghost" onclick="printCurrentTab('contact')">인쇄/PDF</button>
        </div>
        <div class="card table-wrap" id="contactRes"><div class="muted">검색어를 입력하면 결과가 표시됩니다.</div></div>
      `;
    }
    function searchContact(){
      const keyword = q("#contactKeyword") ? q("#contactKeyword").value.trim() : "";
      if(!keyword){
        q("#contactRes").innerHTML = `<div class="muted">검색어를 입력하면 결과가 표시됩니다.</div>`;
        return;
      }
      const list = [...APP.contactRows].filter(x=>{
        const target = `${x.role} ${x.name} ${x.phone} ${x.ext||""}`;
        return target.includes(keyword);
      });
      const r = list.map(x=>`<tr><td>${x.role}</td><td>${x.name}</td><td>${x.phone}</td><td>${x.ext||""}</td></tr>`).join("");
      q("#contactRes").innerHTML = `<table><thead><tr><th>업무</th><th>성명</th><th>연락처</th><th>내선</th></tr></thead><tbody>${r || "<tr><td colspan='4'>검색 결과 없음</td></tr>"}</tbody></table>`;
    }
    function renderData(){
      q("#data").innerHTML = `
        <div class="card">
          <div><b>데이터 교체(선택)</b></div>
          <div class="muted">아래에 JSON을 붙여넣고 적용하면 페이지 새로고침 없이 즉시 반영됩니다. (키: schedule/teacherGroups/academicEvents/contactRows)</div>
          <textarea id="jsonInput" rows="10" style="width:100%;margin-top:8px"></textarea>
          <div class="row" style="margin-top:8px">
            <button onclick="applyJson()">JSON 적용</button>
            <button class="ghost" onclick="downloadTemplate()">템플릿 저장</button>
          </div>
        </div>`;
    }
    function applyJson(){
      try{
        const v=JSON.parse(q("#jsonInput").value);
        APP=v;
        renderAll();
        alert("적용 완료");
      }catch(e){ alert("JSON 형식 오류: "+e.message); }
    }
    function downloadTemplate(){
      const blob=new Blob([JSON.stringify(APP,null,2)],{type:"application/json"});
      const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="school-data-template.json";a.click();
      URL.revokeObjectURL(a.href);
    }

    function printCurrentTab(tabId){
      const target = q("#"+tabId);
      if(!target) return;
      const w = window.open("", "_blank");
      if(!w) return;
      w.document.write(`
        <html><head><meta charset="utf-8"><title>출력</title>
        <style>
          body{font-family:Arial,"Noto Sans KR",sans-serif;padding:16px}
          table{width:100%;border-collapse:collapse;font-size:12px}
          th,td{border:1px solid #cbd5e1;padding:6px;text-align:center}
          th{background:#eff6ff}
          .left{text-align:left}
        </style></head><body>${target.innerHTML}</body></html>
      `);
      w.document.close();
      w.focus();
      setTimeout(()=>w.print(), 150);
    }

    function renderAll(){ renderTabs(); renderSwap(); renderTeacher(); renderGrade(); renderFree(); renderCalendar(); renderContact(); renderData(); }

    (async function boot(){
      try{
        await loadFromGoogleSheet();
      }catch(err){
        console.warn("시트 자동 로드 실패, 내장 예시 데이터 사용:", err);
        alert("구글시트 자동 로드에 실패했습니다. 공유권한(보기 가능) 또는 네트워크 상태를 확인해주세요.");
      }
      renderAll();
    })();
  </script>
</body>
