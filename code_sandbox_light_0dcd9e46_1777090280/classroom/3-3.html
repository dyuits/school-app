<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3학년 3반 교실 알림</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;font-family:'Noto Sans KR',sans-serif;overflow:hidden}
    .idle{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;text-align:center}
    .idle-class{font-size:36px;font-weight:900;color:#ffd700;margin-bottom:8px}
    .idle-icon{font-size:60px;margin-bottom:16px;opacity:.8}
    .idle-title{font-size:24px;font-weight:800;margin-bottom:4px}
    .idle-sub{font-size:15px;opacity:.6}
    .idle-time{font-size:72px;font-weight:900;margin-top:28px;letter-spacing:2px}
    .idle-date{font-size:18px;opacity:.5;margin-top:6px}
    .idle-status{position:absolute;top:20px;right:20px;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700}
    .status-ok{background:rgba(60,200,100,.2);color:#7fff7f}
    .status-err{background:rgba(255,80,80,.2);color:#ff8080}
    .settings-btn{position:absolute;top:20px;left:20px;padding:8px 16px;background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);border-radius:30px;color:#fff;font-size:13px;font-weight:700;cursor:pointer}
    .settings-btn:hover{background:rgba(255,255,255,.3)}
    .soverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
    .soverlay.open{display:flex}
    .sbox{width:90%;max-width:440px;background:#1e2a3a;border:2px solid rgba(255,255,255,.15);border-radius:20px;padding:24px;color:#fff;max-height:85vh;overflow-y:auto}
    .stitle{font-size:16px;font-weight:900;color:#ffd700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
    .sclose{background:none;border:none;color:rgba(255,255,255,.5);font-size:20px;cursor:pointer}
    .srow{display:flex;align-items:center;gap:12px;margin-bottom:14px}
    .slbl{min-width:68px;font-size:13px;font-weight:700;color:rgba(255,255,255,.6);text-align:right}
    .ssel{flex:1;padding:9px 12px;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);border-radius:10px;color:#fff;font-size:13px;font-weight:600;appearance:auto}
    .ssel option{background:#1a1a2e;color:#fff}
    .srng{flex:1;accent-color:#ffd700;height:6px}
    .sval{min-width:26px;font-size:15px;font-weight:900;color:#ffd700;text-align:center}
    .tbtn{width:100%;padding:10px;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.15);border-radius:10px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:12px}
    .tbtn:hover{background:rgba(255,255,255,.2);border-color:#ffd700}
    .call{display:none;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);color:#fff;text-align:center;padding:40px}
    .call.show{display:flex;animation:fi .5s ease}
    @keyframes fi{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
    .cbell{font-size:80px;animation:br .5s ease-in-out 3;margin-bottom:24px}
    @keyframes br{0%{transform:rotate(0)}25%{transform:rotate(15deg)}50%{transform:rotate(-15deg)}75%{transform:rotate(8deg)}100%{transform:rotate(0)}}
    .cteacher{font-size:22px;font-weight:600;color:rgba(255,255,255,.5);margin-bottom:8px}
    .cname{font-size:80px;font-weight:900;margin-bottom:24px;line-height:1.2;text-shadow:0 4px 20px rgba(0,0,0,.3)}
    .cname .hl{color:#ffd700}
    .cmsg{font-size:40px;font-weight:700;color:rgba(255,255,255,.9);line-height:1.5;padding:24px 48px;background:rgba(255,255,255,.08);border-radius:24px;border:2px solid rgba(255,255,255,.12);max-width:90%}
    .ctime{font-size:14px;opacity:.3;position:absolute;bottom:24px}
    .call.fo{animation:fo 1s ease forwards}
    @keyframes fo{to{opacity:0;transform:scale(.9)}}
  </style>
</head>
<body>
  <div class="idle" id="idle">
    <button class="settings-btn" onclick="openS()">⚙️ 설정</button>
    <div class="idle-status status-ok" id="statusBadge">✅ 연결됨</div>
    <div class="idle-class">3학년 3반 교실</div>
    <div class="idle-icon">📢</div>
    <div class="idle-title">호출 대기중</div>
    <div class="idle-sub">교무실에서 호출하면 자동으로 표시됩니다</div>
    <div class="idle-sub" id="audioHint" style="margin-top:10px;font-size:13px;opacity:.5">화면을 한 번 터치하면 소리가 활성화됩니다</div>
    <div class="idle-time" id="iT">--:--</div>
    <div class="idle-date" id="iD">-</div>
  </div>
  <div class="soverlay" id="sO" onclick="if(event.target===this)closeS()"><div class="sbox">
    <div class="stitle">⚙️ 알림 설정<button class="sclose" onclick="closeS()">✕</button></div>
    <div class="srow"><span class="slbl">음성</span><select class="ssel" id="vSel" onchange="saveS()"></select></div>
    <div class="srow"><span class="slbl">호출음</span><select class="ssel" id="cSel" onchange="saveS()"><option value="dingdong">🔔 딩동</option><option value="chime">🎵 차임</option><option value="melody">🎶 멜로디</option><option value="knock">🪵 노크</option><option value="drop">💧 물방울</option><option value="bell">🔔 종소리</option><option value="phone">📞 전화벨</option><option value="alarm">🚨 알람</option></select></div>
    <div class="srow"><span class="slbl">호출 횟수</span><select class="ssel" id="rSel" onchange="saveS()"><option value="1">1회</option><option value="2" selected>2회</option><option value="3">3회</option></select></div>
    <div class="srow"><span class="slbl">볼륨</span><input type="range" class="srng" id="vR" min="1" max="10" value="8" oninput="document.getElementById('vV').textContent=this.value;saveS()"><span class="sval" id="vV">8</span></div>
    <button class="tbtn" onclick="testC()">🔊 소리 테스트</button>
    <div class="srow"><span class="slbl">음성 크기</span><input type="range" class="srng" id="sR" min="1" max="10" value="10" oninput="document.getElementById('sV').textContent=this.value;saveS()"><span class="sval" id="sV">10</span></div>
    <button class="tbtn" onclick="testSp()">🗣️ 음성 테스트</button>
  </div></div>
  <div class="call" id="call">
    <div class="cbell">🔔</div>
    <div class="cteacher" id="cT"></div>
    <div class="cname" id="cN"></div>
    <div class="cmsg" id="cM"></div>
    <div class="ctime" id="cTm"></div>
  </div>
  <script>
    let audioCtx=null;function getAudioContext(){if(!audioCtx||audioCtx.state==='closed'){audioCtx=new(window.AudioContext||window.webkitAudioContext)();}audioCtx.resume().catch(()=>{});return audioCtx;}
    const CLS='3-3';
    const ORIG_TITLE=document.title;let selV=null,db=null,lastCallTs=0;

    // Firebase 초기화
    firebase.initializeApp({
      apiKey:"AIzaSyDF8OLuBylKToxAxKDfZAm9D1uBRlBjv4s",
      databaseURL:"https://numeric-mile-356201-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId:"numeric-mile-356201"
    });
    db=firebase.database();

    // 하트비트 전송 (5초마다)
    function sendHeartbeat(){db.ref('heartbeat/'+CLS).set({ts:Date.now()});}
    sendHeartbeat();
    setInterval(sendHeartbeat,5000);
    // 오프라인 시 하트비트 삭제
    db.ref('heartbeat/'+CLS).onDisconnect().remove();

    // 연결 상태 표시
    db.ref('.info/connected').on('value',snap=>{
      const badge=document.getElementById('statusBadge');
      if(snap.val()){badge.textContent='✅ 연결됨';badge.className='idle-status status-ok';}
      else{badge.textContent='❌ 연결 끊김';badge.className='idle-status status-err';}
    });

    // 호출 수신 (Firebase) - 중복 알람 방지
    db.ref('calls/'+CLS).on('value',snap=>{
      const d=snap.val();
      if(!d)return;
      if(d.timestamp&&(Date.now()-d.timestamp>60000)){db.ref('calls/'+CLS).remove();return;}
      if(d.timestamp&&d.timestamp>lastCallTs){lastCallTs=d.timestamp;showCall(d);setTimeout(()=>{db.ref('calls/'+CLS).remove();},3000);}
    });

    // BroadcastChannel fallback
    try{const ch=new BroadcastChannel('student-call-'+CLS);ch.onmessage=e=>{if(e.data&&e.data.type==='call')showCall(e.data);};}catch(e){}

    // 시계
    function uCk(){const n=new Date(),p=v=>String(v).padStart(2,'0'),w=['일','월','화','수','목','금','토'];const e=document.getElementById('iT');if(e)e.textContent=p(n.getHours())+':'+p(n.getMinutes());const d=document.getElementById('iD');if(d)d.textContent=n.getFullYear()+'년 '+(n.getMonth()+1)+'월 '+n.getDate()+'일 ('+w[n.getDay()]+')';}
    uCk();setInterval(uCk,10000);

    // 음성
    function ensureVoices(){return new Promise(rv=>{const v=speechSynthesis.getVoices();if(v.length>0){rv(v);return;}let done=false;speechSynthesis.onvoiceschanged=()=>{if(!done){done=true;rv(speechSynthesis.getVoices());}};let t=0;const id=setInterval(()=>{const v2=speechSynthesis.getVoices();if(v2.length>0||t++>20){clearInterval(id);if(!done){done=true;rv(v2);}}},200);});}
    function ldV(){if(!('speechSynthesis' in window))return;ensureVoices().then(v=>{const s=document.getElementById('vSel'),k=v.filter(x=>x.lang.startsWith('ko')),l=k.length?k:v.slice(0,15);s.innerHTML='';l.forEach((x,i)=>{const o=document.createElement('option');o.value=i;o.textContent=x.name;o.dataset.n=x.name;s.appendChild(o)});const sv=localStorage.getItem('cr_voice_'+CLS);if(sv){for(let o of s.options)if(o.dataset.n===sv){s.value=o.value;break;}}updV(v);});}
    function updV(vl){const s=document.getElementById('vSel'),v=vl||speechSynthesis.getVoices(),k=v.filter(x=>x.lang.startsWith('ko')),l=k.length?k:v.slice(0,15);selV=l[parseInt(s.value)||0]||null;}
    if('speechSynthesis' in window){ldV();}

    function saveS(){if(!selV&&'speechSynthesis' in window){const vt=speechSynthesis.getVoices();if(vt.length>0)updV(vt);}else{updV();}try{localStorage.setItem('cr_s_'+CLS,JSON.stringify({v:selV?selV.name:'',c:document.getElementById('cSel').value,r:document.getElementById('rSel').value,vl:document.getElementById('vR').value,sv:document.getElementById('sR').value}));localStorage.setItem('cr_voice_'+CLS,selV?selV.name:'');}catch(e){}}
    function ldS(){try{const s=JSON.parse(localStorage.getItem('cr_s_'+CLS));if(!s)return;document.getElementById('cSel').value=s.c||'dingdong';document.getElementById('rSel').value=s.r||'2';document.getElementById('vR').value=s.vl||8;document.getElementById('vV').textContent=s.vl||8;document.getElementById('sR').value=s.sv||10;document.getElementById('sV').textContent=s.sv||10;}catch(e){}}
    ldS();
    function openS(){document.getElementById('sO').classList.add('open');}
    function closeS(){document.getElementById('sO').classList.remove('open');}
    function gVol(){return parseInt(document.getElementById('vR').value)/10;}
    function playC(){const tp=document.getElementById('cSel').value,vl=gVol();return new Promise(rv=>{try{const c=getAudioContext();function t(f,s,d,w,v){const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=w||'sine';o.frequency.value=f;g.gain.setValueAtTime(v*vl,c.currentTime+s);g.gain.exponentialRampToValueAtTime(.01,c.currentTime+s+d);o.start(c.currentTime+s);o.stop(c.currentTime+s+d);}({dingdong:()=>{t(880,0,.5,'sine',.4);t(659,.4,.7,'sine',.4)},chime:()=>{t(523,0,.8,'sine',.3);t(659,.3,.8,'sine',.3);t(784,.6,1,'sine',.3)},melody:()=>{[523,659,784,1047].forEach((f,i)=>t(f,i*.2,.5,'sine',.3))},knock:()=>{t(200,0,.1,'square',.5);t(180,.2,.1,'square',.5);t(200,.5,.1,'square',.4)},drop:()=>{t(1200,0,.3,'sine',.3);t(800,.15,.4,'sine',.25);t(600,.35,.5,'sine',.2)},bell:()=>{t(880,0,1.2,'sine',.4);t(660,.8,1,'sine',.3)},phone:()=>{for(let i=0;i<4;i++){t(1400,i*.3,.12,'square',.3);t(1800,i*.3+.12,.12,'square',.3)}},alarm:()=>{for(let i=0;i<6;i++)t(800+(i%2)*400,i*.25,.2,'sawtooth',.25)}}[tp]||function(){t(880,0,.5,'sine',.4);t(659,.4,.7,'sine',.4)})();setTimeout(()=>{rv()},2000);}catch(e){rv();}});}
    function gSV(){return parseInt(document.getElementById('sR').value)/10;}
    function spk(text){if(!('speechSynthesis' in window))return Promise.resolve();speechSynthesis.cancel();if(!selV){const vv=speechSynthesis.getVoices();if(vv.length>0)updV(vv);}let cl=text.replace(/[^가-힣a-zA-Z0-9\s,.!?\-]/g,'').slice(0,100);function _attempt(){return new Promise(r=>{const u=new SpeechSynthesisUtterance(cl);u.lang='ko-KR';u.rate=0.9;u.pitch=1.0;u.volume=gSV();if(selV)u.voice=selV;let done=false;u.onend=()=>{if(!done){done=true;r(true);}};u.onerror=()=>{if(!done){done=true;r(false);}};speechSynthesis.speak(u);const ri=setInterval(()=>{if(speechSynthesis.speaking&&speechSynthesis.paused)speechSynthesis.resume();},3000);setTimeout(()=>{clearInterval(ri);if(!done){done=true;speechSynthesis.cancel();r(false);}},15000);});}return _attempt().then(ok=>{if(!ok)return new Promise(r=>setTimeout(r,500)).then(()=>{speechSynthesis.cancel();return _attempt();});});}
    function testC(){playC();}
    function testSp(){spk('안녕하세요. 음성 테스트입니다.');}
    // 첫 터치/클릭으로 오디오 정책 해제
    function primeAudio(){try{const ac=getAudioContext();ac.resume().catch(()=>{});if('speechSynthesis' in window){const u=new SpeechSynthesisUtterance('');speechSynthesis.speak(u);speechSynthesis.cancel();}}catch(e){}const h=document.getElementById('audioHint');if(h)h.style.display='none';}
    document.addEventListener('click',primeAudio,{once:true});
    document.addEventListener('touchstart',primeAudio,{once:true});
    // Auto-prime audio (silent - no alarm sound)
    setTimeout(()=>{
      try{
        const ac=getAudioContext();
        ac.resume().then(()=>{
          const osc=ac.createOscillator();
          const g=ac.createGain();
          osc.connect(g);g.connect(ac.destination);
          g.gain.value=0;
          osc.start();osc.stop(ac.currentTime+0.01);
          
        });
      }catch(e){}
      if('speechSynthesis' in window){
        const u=new SpeechSynthesisUtterance('');
        speechSynthesis.speak(u);speechSynthesis.cancel();
      }
    },1500);
    // Prevent accidental close
    window.onbeforeunload=()=>'교실 알림이 종료됩니다.';
    async function showCall(d){document.title='[CALL] '+ORIG_TITLE;
      try{window.moveTo(0,0);window.resizeTo(screen.availWidth,screen.availHeight);window.focus();}catch(e){}try{getAudioContext().resume();}catch(e){}try{window.focus();if(document.documentElement.requestFullscreen&&!document.fullscreenElement){document.documentElement.requestFullscreen().catch(()=>{});}}catch(e){}await new Promise(r=>setTimeout(r,500));if('speechSynthesis' in window){speechSynthesis.cancel();const _wu=new SpeechSynthesisUtterance('');speechSynthesis.speak(_wu);speechSynthesis.cancel();}closeS();if('speechSynthesis' in window){await ensureVoices().then(v=>{updV(v);});}const idle=document.getElementById('idle'),call=document.getElementById('call');idle.style.display='none';call.style.display='flex';call.className='call show';document.getElementById('cT').textContent=d.callerTeacher?d.callerTeacher+' 선생님 호출':'';document.getElementById('cN').innerHTML='<span class="hl">'+d.studentName+'</span> 학생';document.getElementById('cM').textContent=d.message;const n=new Date();document.getElementById('cTm').textContent=n.getFullYear()+'년 '+(n.getMonth()+1)+'월 '+n.getDate()+'일 '+String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');const sp=d.studentName+' 학생, '+d.message;const rp=parseInt(document.getElementById('rSel').value)||2;for(let i=0;i<rp;i++){if(i>0)await new Promise(r=>setTimeout(r,2000));await playC();await new Promise(r=>setTimeout(r,500));await spk(sp);}await new Promise(r=>setTimeout(r,4000));call.className='call fo';setTimeout(()=>{call.style.display='none';idle.style.display='flex';document.title=ORIG_TITLE;try{window.resizeTo(1,1);window.moveTo(-32000,-32000);}catch(e){}},1000);}
  
  </script>
</body>
</html>
